<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Diagnostic Mode</title>
    <style>
        :root {
            --mesh: #5dffcc;
            --mesh-dim: rgba(93, 255, 204, 0.4);
            --bg: #000c0a;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--mesh);
            font-family: 'Consolas', 'Courier New', monospace;
            overflow: hidden;
            background-image: 
                linear-gradient(var(--mesh-dim) 1px, transparent 1px),
                linear-gradient(90deg, var(--mesh-dim) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Diagnostic Reticles */
        .reticle-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .targeting-bracket {
            width: 400px;
            height: 400px;
            position: relative;
        }
        
        .targeting-bracket::before, .targeting-bracket::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            border: 2px solid var(--mesh);
            animation: pulse-bracket 4s infinite alternate;
        }

        .targeting-bracket::before { clip-path: polygon(0 0, 20% 0, 20% 5%, 5% 5%, 5% 20%, 0 20%, 0 80%, 5% 80%, 5% 95%, 20% 95%, 20% 100%, 0 100%); }
        .targeting-bracket::after { clip-path: polygon(100% 0, 80% 0, 80% 5%, 95% 5%, 95% 20%, 100% 20%, 100% 80%, 95% 80%, 95% 95%, 80% 95%, 80% 100%, 100% 100%); }

        @keyframes pulse-bracket {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 0.3; }
        }

        .central-designation {
            text-align: center;
            z-index: 10;
        }
        .central-designation h1 { font-size: 2.5rem; letter-spacing: 12px; margin: 0; color: #fff; text-shadow: 0 0 15px var(--mesh); }
        .central-designation p { font-size: 1rem; letter-spacing: 4px; margin-top: 10px; }

        /* Navigation Menu */
        .nav-menu {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 50;
        }
        .nav-btn {
            background: rgba(0, 12, 10, 0.8);
            border: 1px dashed var(--mesh);
            color: var(--mesh);
            padding: 8px 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            letter-spacing: 2px;
            transition: all 0.2s;
        }
        .nav-btn:hover {
            background: var(--mesh);
            color: var(--bg);
            box-shadow: 0 0 15px var(--mesh);
        }

        /* Floating Info Panels */
        .panel {
            position: absolute;
            background: rgba(0, 12, 10, 0.9);
            border: 1px dotted var(--mesh);
            padding: 20px;
            width: 250px;
        }
        .p-top-left { top: 20px; left: 20px; }
        .p-bottom-left { bottom: 20px; left: 20px; }
        .p-bottom-right { bottom: 20px; right: 20px; }
        .p-top-right { top: 20px; right: 20px; }

        .panel-heading { font-size: 0.8rem; margin-bottom: 10px; border-bottom: 1px solid var(--mesh-dim); padding-bottom: 4px; }
        .data-line { display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 5px; }

        /* Terminal Pop-up */
        .terminal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 12, 10, 0.9);
            z-index: 150; display: none;
        }
        .terminal-overlay.active { display: block; }
        
        .terminal-popup {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 600px; max-width: 90vw; height: 400px;
            background: #000;
            border: 2px solid var(--mesh);
            z-index: 200; display: none; flex-direction: column;
        }
        .terminal-popup.active { display: flex; }
        
        .terminal-header {
            background: var(--mesh-dim); padding: 10px;
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--mesh);
        }
        .close-btn { cursor: pointer; color: #fff; font-weight: bold; }
        .close-btn:hover { color: var(--mesh); }
        
        .terminal-body {
            padding: 20px; flex: 1; overflow-y: auto; color: var(--mesh);
            line-height: 1.6; font-size: 14px;
        }
        .terminal-cursor {
            display: inline-block; width: 10px; height: 16px; background: var(--mesh);
            animation: blink 1s infinite; vertical-align: middle; margin-left: 5px;
        }
        @keyframes blink { 50% { opacity: 0; } }

    </style>
</head>
<body>
    
    <div class="nav-menu">
        <button class="nav-btn" onclick="openTerminal('about')">ABOUT</button>
        <button class="nav-btn" onclick="openTerminal('career')">CAREERS</button>
        <button class="nav-btn" onclick="openTerminal('contact')">CONTACT</button>
    </div>

    <!-- Terminal System -->
    <div class="terminal-overlay" id="term-overlay" onclick="closeTerminal()"></div>
    <div class="terminal-popup" id="terminal">
        <div class="terminal-header">
            <span style="letter-spacing:2px;font-size:12px;" id="term-title">DIAGNOSTIC_TERMINAL</span>
            <span class="close-btn" onclick="closeTerminal()">[ X ]</span>
        </div>
        <div class="terminal-body" id="term-body"></div>
    </div>

    <div class="reticle-container">
        <div class="targeting-bracket"></div>
        <div class="central-designation" style="position:absolute;">
            <h1>ZAIBLITZ</h1>
            <p>DIAGNOSTIC SCHEMATIC</p>
        </div>
    </div>

    <!-- Diagnostic Panels -->
    <div class="panel p-top-left panel-hover">
        <div class="panel-heading">NODE INTEGRITY</div>
        <div class="data-line"><span>ROUTING</span><span>OK</span></div>
        <div class="data-line"><span>MEMORY ALLOCATION</span><span>STABLE</span></div>
        <div class="data-line"><span>SERVER LOAD</span><span>12%</span></div>
    </div>

    <div class="panel p-bottom-left panel-hover">
        <div class="panel-heading">PROJECT PIPELINE</div>
        <div class="data-line"><span>ATLAS.SYS</span><span>100%</span></div>
        <div class="data-line"><span>BEACON.SYS</span><span>ACTIVE</span></div>
        <div class="data-line"><span>FORGE.SYS</span><span>BUILDING...</span></div>
    </div>

    <div class="panel p-top-right panel-hover">
        <div class="panel-heading">FRAMEWORK SPECS</div>
        <div class="data-line"><span>REACT CORE</span><span>v19.x</span></div>
        <div class="data-line"><span>LARAVEL API</span><span>v11.x</span></div>
        <div class="data-line"><span>TAILWIND/CSS</span><span>3.4.x</span></div>
    </div>

    <div class="panel p-bottom-right panel-hover">
        <div class="panel-heading">COORDINATES</div>
        <div class="data-line"><span>LAT</span><span>14.5995 N</span></div>
        <div class="data-line"><span>LNG</span><span>120.9842 E</span></div>
    </div>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if(!audioCtx) audioCtx = new window.AudioContext();
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playBeep(freq, type, duration, vol, delay = 0) {
            if(!audioCtx) return;
            setTimeout(() => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(freq * 0.9, audioCtx.currentTime + duration);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            }, delay);
        }

        document.body.addEventListener('click', () => { initAudio(); }, { once: true });

        document.querySelectorAll('.panel-hover, .nav-btn').forEach(el => {
            el.addEventListener('mouseenter', () => {
                initAudio();
                playBeep(2000, 'square', 0.05, 0.02, 0);
            });
        });

        const terminalData = {
            about: ">> EXAMINING ROOT DIRECTORY...\n\n> ZAIBLITZ SYSTEMS\n> STRUCTURAL INTEGRITY: MAXIMUM\n> FOCUS: Building high-performance, modular applications with raw coding precision.\n> [ DIAGNOSTIC COMPLETE ]",
            career: ">> RUNNING PERSONNEL QUERY...\n\n> NO ANOMALIES FOUND.\n> REQUIRED CLASSES:\n  - DIAGNOSTIC UX ENGINEER [OPEN]\n  - DATABASE RELAY TECHNICIAN [OPEN]\n\n> AWAITING CANDIDATE DATA.",
            contact: ">> PINGING RELAY NODE...\n\n> NODE RESPONDED: comms@zaiblitz.net\n> LATENCY: 12ms\n> CONNECTION ROUTE: SECURED, ENCRYPTED, TRACEABLE."
        };

        let typingTimer;

        function openTerminal(section) {
            initAudio();
            playBeep(1200, 'sawtooth', 0.1, 0.1, 0); // Open diag sound
            
            const overlay = document.getElementById('term-overlay');
            const terminal = document.getElementById('terminal');
            const termBody = document.getElementById('term-body');
            const termTitle = document.getElementById('term-title');
            
            overlay.classList.add('active');
            terminal.classList.add('active');
            termTitle.innerText = `DIAG // ${section.toUpperCase()}`;
            termBody.innerHTML = '';
            
            const textToType = terminalData[section];
            let i = 0;
            if(typingTimer) clearInterval(typingTimer);
            
            typingTimer = setInterval(() => {
                if(i < textToType.length) {
                    let char = textToType.charAt(i);
                    let htmlChar = (char === '\n') ? '<br>' : char;
                    
                    termBody.innerHTML = termBody.innerHTML.replace('<span class="terminal-cursor"></span>', '') + htmlChar + '<span class="terminal-cursor"></span>';
                    
                    if(char !== ' ' && char !== '\n') {
                        // High pitch click for diag typing
                        playBeep(2400, 'square', 0.01, 0.01, 0);
                    }
                    
                    i++;
                    termBody.scrollTop = termBody.scrollHeight;
                } else {
                    clearInterval(typingTimer);
                }
            }, 20);
        }

        function closeTerminal() {
            playBeep(800, 'sawtooth', 0.1, 0.1, 0);
            if(typingTimer) clearInterval(typingTimer);
            document.getElementById('term-overlay').classList.remove('active');
            document.getElementById('terminal').classList.remove('active');
        }
    </script>
</body>
</html>
